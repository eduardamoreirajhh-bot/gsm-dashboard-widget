<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSM Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#191919;
overflow:hidden;
font-family:Georgia,serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.widget{
width:100%;
padding:30px;
text-align:center;
background:#191919;
color:#d4af37;
display:flex;
flex-direction:column;
align-items:center;
}

.columns{
display:flex;
flex-direction:row;
align-items:flex-start;
gap:80px;
}

.col-left,
.col-right{
text-align:left;
}

.col-right{
border-left:2px solid #d4af37;
padding-left:40px;
}

#greeting{
font-size:34px;
font-weight:bold;
color:white;
margin-bottom:8px;
}

#message{
font-size:18px;
font-style:italic;
margin-bottom:25px;
color:#d4af37;
}

#time{
font-size:64px;
font-weight:bold;
}

#date{
font-size:22px;
color:white;
margin-bottom:22px;
}

#weather{
font-size:18px;
color:white;
}

.line{
width:180px;
height:2px;
background:#d4af37;
margin:30px auto 20px;
}

.quote{
font-size:18px;
font-style:italic;
color:#d4af37;
text-align:center;
}
</style>

</head>

<body>

<div class="widget">

<div class="columns">

<div class="col-left">
<div id="greeting"></div>
<div id="message"></div>
<div id="time"></div>
</div>

<div class="col-right">
<div id="date"></div>
<div id="weather">📍 Taunton, MA</div>
</div>

</div>

<div class="line"></div>

<div class="quote">
Building Excellence.<br>
Growing Every Project.
</div>

</div>

<script>

function updateClock(){

const now=new Date();
const h=now.getHours();

let greeting="";
let message="";

if(h<12){
greeting="Good Morning, Eduarda";
message="Let's build something great today.";
}else if(h<18){
greeting="Good Afternoon, Eduarda";
message="Keep moving. Success is built daily.";
}else{
greeting="Good Evening, Eduarda";
message="Great work today. Tomorrow we build again.";
}

document.getElementById("greeting").textContent=greeting;
document.getElementById("message").textContent=message;

document.getElementById("time").textContent=
now.toLocaleTimeString("en-US",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("date").textContent=
now.toLocaleDateString("en-US",{
weekday:"long",
month:"long",
day:"numeric",
year:"numeric"
});

}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
