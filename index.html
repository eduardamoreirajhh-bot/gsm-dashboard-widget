<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSM Widget</title>

<style>
body{
margin:0;
background:transparent;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#d4af37;
}

.widget{
width:100%;
text-align:center;
background:transparent;
}

.label{
display:none;
}

#greeting{
font-size:34px;
font-weight:bold;
color:white;
margin-bottom:8px;
}

#message{
font-size:18px;
font-style:italic;
margin-bottom:30px;
}

#time{
font-size:72px;
font-weight:bold;
margin-bottom:20px;
}

.date-row{
font-size:24px;
margin-bottom:25px;
color:white;
}

.weather{
font-size:20px;
color:white;
}

.quote{
margin-top:30px;
font-size:18px;
font-style:italic;
color:#d4af37;
}

.line{
width:220px;
height:2px;
background:#d4af37;
margin:25px auto;
}
</style>

</head>

<body>

<div class="widget">

<div id="greeting"></div>
<div id="message"></div>

<div id="time"></div>

<div class="date-row">
<span id="day"></span>
•
<span id="fullDate"></span>
</div>

<div class="weather">
📍 Taunton, MA
</div>

<div class="line"></div>

<div class="quote">
Building Excellence.<br>
Growing Every Project.
</div>

</div>

<script>

function update(){

const now=new Date();

const hour=now.getHours();

let greet="";
let msg="";

if(hour<12){
greet="Good Morning, Eduarda";
msg="Let's build something great today.";
}else if(hour<18){
greet="Good Afternoon, Eduarda";
msg="Keep moving. Success is built daily.";
}else{
greet="Good Evening, Eduarda";
msg="Great work today. Tomorrow we build again.";
}

document.getElementById("greeting").innerHTML=greet;
document.getElementById("message").innerHTML=msg;

document.getElementById("time").innerHTML=
now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

document.getElementById("day").innerHTML=
now.toLocaleDateString("en-US",{weekday:"long"});

document.getElementById("fullDate").innerHTML=
now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

}

update();

setInterval(update,1000);

</script>

</body>
</html>
